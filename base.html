<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇰🇪 Kenyan Legal Assistant - Know Your Rights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/coat-of-arms.svg') }}" 
                     alt="Kenya Coat of Arms" 
                     class="coat-of-arms">
                <div class="title-container">
                    <h1>Kenyan Legal Assistant</h1>
                    <p class="tagline">Know Your Rights | Understand the Law</p>
                </div>
            </div>
            <nav class="nav">
                <a href="{{ url_for('index') }}" class="nav-link">Chat</a>
                <a href="{{ url_for('about') }}" class="nav-link">About</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>⚖️ Powered by Kenyan Law | AI for Justice | <a href="/about">Learn More</a></p>
            <p class="disclaimer">This is an informational tool. For legal advice, consult a qualified lawyer.</p>
        </div>
    </footer>
    
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
