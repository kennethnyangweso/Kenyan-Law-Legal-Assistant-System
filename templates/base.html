<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇰🇪 Kenyan Legal Assistant - Know Your Rights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo-container">
                <!-- Kenya Coat of Arms -->
                <div class="coat-of-arms">
                    <img src="{{ url_for('static', filename='images/kenya_court_of_arms.png') }}"
                         alt="Kenya Coat of Arms" 
                         width="60" 
                         height="auto">
                </div>
                <div class="title-container">
                    <h1>Kenyan Legal Assistant</h1>
                    <p class="tagline">Know Your Rights | Understand the Law</p>
                </div>
            </div>
            <!-- Navigation Menu -->
            <nav class="nav">
                <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">🏠 Home</a>
                <a href="/chat" class="nav-link {% if request.endpoint == 'chat_page' %}active{% endif %}">💬 Chat</a>
                <a href="/about" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">ℹ️ About</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>⚖️ Powered by Kenyan Law | AI for Justice</p>
            <p class="disclaimer">This is an informational tool. For legal advice, consult a qualified lawyer.</p>
        </div>
    </footer>
</body>
</html>
